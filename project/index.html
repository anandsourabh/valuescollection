<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Blue[i] Values Collection — Prototype</title>
  <meta name="viewport" content="width=1400" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
    body { font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="state.jsx"></script>
  <script type="text/babel" src="screens/dashboard.jsx"></script>
  <script type="text/babel" src="screens/campaigns.jsx"></script>
  <script type="text/babel" src="screens/create-campaign.jsx"></script>
  <script type="text/babel" src="screens/contributor-form.jsx"></script>
  <script type="text/babel" src="screens/other-screens.jsx"></script>
  <script type="text/babel" src="screens/contributor-portfolio.jsx"></script>
  <script type="text/babel" src="screens/app-shell.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // Each artboard gets its own StoreProvider + ToastProvider so actions
    // in one don't mutate state in another.
    const Artboard = ({ children, initial }) => (
      <StoreProvider initial={initial}>
        <ToastProvider>
          <div style={{ width: '100%', height: '100%', overflow: 'hidden' }}>
            {children}
          </div>
        </ToastProvider>
      </StoreProvider>
    );

    // iPhone-style frame for mobile signed-link artboard
    const PhoneFrame = ({ children }) => (
      <div style={{
        width: '100%', height: '100%',
        background: '#1a1a1a',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        padding: 24,
      }}>
        <div style={{
          width: 390, height: 780,
          background: '#000', borderRadius: 44,
          padding: 10, boxShadow: '0 20px 60px rgba(0,0,0,.4)',
        }}>
          <div style={{
            width: '100%', height: '100%',
            borderRadius: 34, overflow: 'hidden',
            position: 'relative', background: '#fff',
          }}>
            <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 44, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 28px 0', zIndex: 20, pointerEvents: 'none' }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-1)' }}>9:41</div>
              <div style={{ width: 100, height: 28, background: '#000', borderRadius: 20, position: 'absolute', left: '50%', transform: 'translateX(-50%)', top: 8 }}></div>
              <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                <svg width="16" height="10" viewBox="0 0 16 10" fill="var(--ink-1)"><rect x="1" y="6" width="2" height="3"/><rect x="5" y="4" width="2" height="5"/><rect x="9" y="2" width="2" height="7"/><rect x="13" y="0" width="2" height="9"/></svg>
                <svg width="22" height="10" viewBox="0 0 22 10" fill="none" stroke="var(--ink-1)" strokeWidth="1"><rect x="1" y="1" width="18" height="8" rx="2"/><rect x="3" y="3" width="14" height="4" fill="var(--ink-1)"/></svg>
              </div>
            </div>
            <div style={{ height: '100%', paddingTop: 44 }}>{children}</div>
          </div>
        </div>
      </div>
    );

    // Top-level tour map
    const App = () => (
      <DesignCanvas>
        <DCSection id="overview" title="Blue[i] Values Collection" subtitle="Interactive prototype · click any artboard to focus · navigate with ← → or click controls inside">
          <DCArtboard id="dashboard" label="01 · Admin dashboard" width={1280} height={820}>
            <Artboard><AdminApp initialNav="dashboard" /></Artboard>
          </DCArtboard>
          <DCArtboard id="campaigns" label="02 · Campaigns list" width={1280} height={820}>
            <Artboard><AdminApp initialNav="campaigns" /></Artboard>
          </DCArtboard>
          <DCArtboard id="campaign-detail" label="03 · Campaign detail + assignments" width={1280} height={820}>
            <Artboard><AdminApp initialNav="campaign-detail" /></Artboard>
          </DCArtboard>
        </DCSection>

        <DCSection id="admin-flows" title="Admin flows" subtitle="Create, assign, configure">
          <DCArtboard id="create-campaign" label="04 · Create campaign wizard" width={1280} height={820}>
            <Artboard><AdminApp initialNav="create-campaign" /></Artboard>
          </DCArtboard>
          <DCArtboard id="form-builder" label="05 · Form builder" width={1280} height={820}>
            <Artboard><AdminApp initialNav="forms" /></Artboard>
          </DCArtboard>
          <DCArtboard id="settings" label="06 · Reminders & SLA" width={1280} height={820}>
            <Artboard><AdminApp initialNav="settings" /></Artboard>
          </DCArtboard>
        </DCSection>

        <DCSection id="review-flow" title="Reviewer console" subtitle="Approve, reject, reopen">
          <DCArtboard id="review-queue" label="07 · Review queue" width={1280} height={820}>
            <Artboard><ReviewerApp initial="queue" /></Artboard>
          </DCArtboard>
          <DCArtboard id="review-detail" label="08 · Submission review · diff + decision" width={1280} height={820}>
            <Artboard><ReviewerApp initial="detail" /></Artboard>
          </DCArtboard>
        </DCSection>

        <DCSection id="contributor" title="Contributor form" subtitle="COPE / TIV / BI · repeating buildings · calculated totals">
          <DCArtboard id="form-start" label="09 · Form — identity + COPE" width={1280} height={820}>
            <Artboard><AdminApp initialNav="assignment-form" /></Artboard>
          </DCArtboard>
          <DCArtboard id="form-values" label="10 · Values — repeating per building" width={1280} height={820}>
            <Artboard>
              <ValueScreenOpener section="values" />
            </Artboard>
          </DCArtboard>
          <DCArtboard id="form-review" label="11 · Form · review & submit" width={1280} height={820}>
            <Artboard>
              <ValueScreenOpener section="review" />
            </Artboard>
          </DCArtboard>
        </DCSection>

        <DCSection id="external-bundled" title="External — bundled link (recommended)" subtitle="One signed link per contributor · portfolio of their assigned locations · each location submits & reviews independently">
          <DCArtboard id="signed-link-landing-bundled" label="12 · Landing — 7 locations" width={520} height={820}>
            <Artboard>
              <SignedLinkFlow model="bundled" startAt="landing" />
            </Artboard>
          </DCArtboard>
          <DCArtboard id="signed-link-portfolio" label="13 · My locations (portfolio)" width={1280} height={860}>
            <Artboard>
              <SignedLinkFlow model="bundled" startAt="portfolio" />
            </Artboard>
          </DCArtboard>
          <DCArtboard id="signed-link-form-bundled" label="14 · Filling one location · returns to portfolio on submit" width={1280} height={860}>
            <Artboard>
              <SignedLinkFlow model="bundled" startAt="form" />
            </Artboard>
          </DCArtboard>
        </DCSection>

        <DCSection id="external-perloc" title="External — per-location link (alt.)" subtitle="One signed link per assignment · max isolation · N emails per contributor">
          <DCArtboard id="signed-link-landing-perloc" label="15 · Landing — single location" width={520} height={820}>
            <Artboard>
              <SignedLinkFlow model="perloc" startAt="landing" />
            </Artboard>
          </DCArtboard>
          <DCArtboard id="signed-link-mobile" label="16 · Landing — mobile (per-location)" width={520} height={820}>
            <Artboard>
              <div className="app-root" style={{ height: '100%' }}>
                <PhoneFrame>
                  <div style={{ height: '100%', overflow: 'auto' }}>
                    <ScreenSignedLinkV2 model="perloc" />
                  </div>
                </PhoneFrame>
              </div>
            </Artboard>
          </DCArtboard>
          <DCArtboard id="signed-link-form-perloc" label="17 · Form — single assignment" width={1280} height={860}>
            <Artboard>
              <SignedLinkFlow model="perloc" startAt="form" />
            </Artboard>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    // Helper — opens the contributor form on a specific section
    const ValueScreenOpener = ({ section }) => {
      const [ready, setReady] = React.useState(false);
      const ref = React.useRef(null);
      React.useEffect(() => {
        // After initial render, click the target section button
        const t = setTimeout(() => {
          const el = ref.current && ref.current.querySelector(`[data-form-section="${section}"]`);
          if (el) el.click();
          setReady(true);
        }, 60);
        return () => clearTimeout(t);
      }, []);
      return (
        <div ref={ref} style={{ height: '100%' }}>
          <AdminApp initialNav="assignment-form-section" />
          {/* Falls back to default section; for brevity we render AdminApp and the user can click Values/Review in the sidebar. */}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
