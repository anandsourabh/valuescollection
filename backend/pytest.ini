[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: unit tests
    integration: integration tests
    auth: authentication tests
    campaigns: campaign tests
    assignments: assignment tests
    delegations: delegation tests
    submissions: submission tests
    reviews: review tests
